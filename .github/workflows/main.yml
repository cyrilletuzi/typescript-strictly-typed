name: CI

on: pull_request

permissions:
  contents: read

jobs:
  check:
    name: Lint and type check
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install npm 12 for security
        run: npm install -g npm@^12.0.0
      - name: Install dependencies
        run: npm ci
        env:
          CI: true
      - name: Lint and type check
        run: npm run check
